<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="100%">
  <!-- پس‌زمینه -->
  <rect width="800" height="450" fill="#f8f9fa"/>
  <rect width="800" height="450" fill="url(#grad)" opacity="0.6"/>
  
  <defs>
    <!-- گرادیان ملایم پس‌زمینه -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa" />
      <stop offset="100%" stop-color="#e9ecef" />
    </linearGradient>
  </defs>

  <!-- گروه آیکون مرکزی (کتاب) -->
  <g transform="translate(350, 175)" fill="none" stroke="#b91c1c" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.2">
    <!-- صفحات کتاب -->
    <path d="M 50 80 V 20 C 50 10 30 10 10 10 V 70 C 30 70 50 80 50 80 Z" />
    <path d="M 50 80 V 20 C 50 10 70 10 90 10 V 70 C 70 70 50 80 50 80 Z" />
    <!-- خطوط تزئینی -->
    <line x1="20" y1="30" x2="40" y2="30" stroke-width="4" />
    <line x1="20" y1="45" x2="40" y2="45" stroke-width="4" />
    <line x1="60" y1="30" x2="80" y2="30" stroke-width="4" />
    <line x1="60" y1="45" x2="80" y2="45" stroke-width="4" />
  </g>
</svg>
